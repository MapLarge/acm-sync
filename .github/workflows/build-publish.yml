name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_NAME: acm-sync

permissions:
  contents: write
  packages: write

jobs:
  # ---------- Detect changed paths (used to gate PR jobs) ----------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      chart: ${{ steps.filter.outputs.chart }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - "**/*.go"
              - "go.mod"
              - "go.sum"
              - "Dockerfile"
            chart:
              - "charts/**"

  # ---------- Build & push Docker image ----------
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.go == 'true'
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On tag push: v1.2.3 → 1.2.3, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # On main push: sha-abc1234
            type=sha,prefix=sha-,format=short
            # Always: branch name for main
            type=ref,event=branch
            # PR: pr-123
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Helm lint (PR only, chart files changed) ----------
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.chart == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/${{ env.CHART_NAME }}/

  # ---------- Package & push Helm chart ----------
  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR (OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Determine chart version
        id: chart-version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Strip leading 'v' from tag: v1.2.3 → 1.2.3
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Use Chart.yaml version + short SHA for non-tag builds
            VERSION="$(grep '^version:' charts/${{ env.CHART_NAME }}/Chart.yaml | awk '{print $2}')-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Chart version: $VERSION"

      - name: Update Chart.yaml with version and appVersion
        run: |
          cd charts/${{ env.CHART_NAME }}
          sed -i "s/^version:.*/version: ${{ steps.chart-version.outputs.version }}/" Chart.yaml
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            sed -i "s/^appVersion:.*/appVersion: \"${GITHUB_REF_NAME#v}\"/" Chart.yaml
          fi
          cat Chart.yaml

      - name: Lint chart
        run: helm lint charts/${{ env.CHART_NAME }}/

      - name: Package chart
        run: helm package charts/${{ env.CHART_NAME }}/ --destination .helm-packages

      - name: Push chart to GHCR
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push .helm-packages/${{ env.CHART_NAME }}-${{ steps.chart-version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${OWNER}/charts

  # ---------- GitHub Release ----------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, helm]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p' || true)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          {
            echo "notes<<NOTES_EOF"
            echo "## Artifacts"
            echo ""
            echo "### Docker image"
            echo '```bash'
            echo "docker pull ghcr.io/${REPO_LOWER}:${VERSION}"
            echo '```'
            echo ""
            echo "### Helm chart"
            echo '```bash'
            echo "helm install acm-sync oci://ghcr.io/${OWNER_LOWER}/charts/acm-sync --version ${VERSION}"
            echo '```'
            echo ""
            echo "## Changes"
            echo ""
            if [[ -n "$PREV_TAG" ]]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" --no-merges
            else
              git log --pretty=format:"- %s (%h)" --no-merges
            fi
            echo ""
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: false
