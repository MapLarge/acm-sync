name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_NAME: acm-sync

permissions:
  contents: read
  packages: write

jobs:
  # ---------- Build & push Docker image ----------
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On tag push: v1.2.3 → 1.2.3, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # On main push: sha-abc1234
            type=sha,prefix=sha-,format=short
            # Always: branch name for main
            type=ref,event=branch
            # PR: pr-123
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Package & push Helm chart ----------
  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR (OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Determine chart version
        id: chart-version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Strip leading 'v' from tag: v1.2.3 → 1.2.3
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Use Chart.yaml version + short SHA for non-tag builds
            VERSION="$(grep '^version:' charts/${{ env.CHART_NAME }}/Chart.yaml | awk '{print $2}')-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Chart version: $VERSION"

      - name: Update Chart.yaml with version and appVersion
        run: |
          cd charts/${{ env.CHART_NAME }}
          sed -i "s/^version:.*/version: ${{ steps.chart-version.outputs.version }}/" Chart.yaml
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            sed -i "s/^appVersion:.*/appVersion: \"${GITHUB_REF_NAME#v}\"/" Chart.yaml
          fi
          cat Chart.yaml

      - name: Lint chart
        run: helm lint charts/${{ env.CHART_NAME }}/

      - name: Package chart
        run: helm package charts/${{ env.CHART_NAME }}/ --destination .helm-packages

      - name: Push chart to GHCR
        run: |
          helm push .helm-packages/${{ env.CHART_NAME }}-${{ steps.chart-version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
