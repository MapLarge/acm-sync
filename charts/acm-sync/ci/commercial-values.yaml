image:
  repository: ghcr.io/maplarge/acm-sync
  tag: "0.1.0"

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/acm-sync

controller:
  useFIPSEndpoint: false
  leaderElect: true

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi
