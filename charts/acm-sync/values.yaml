replicaCount: 1

image:
  repository: ghcr.io/maplarge/acm-sync
  tag: ""  # Defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  # For IRSA, set the role ARN (not needed for EKS Pod Identity):
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/acm-sync
  # For GovCloud IRSA:
  #   eks.amazonaws.com/role-arn: arn:aws-us-gov:iam::123456789012:role/acm-sync
  name: ""

# Extra environment variables for the controller container.
# Useful for passing AWS credentials on non-EKS clusters:
#   extraEnv:
#     - name: AWS_ACCESS_KEY_ID
#       valueFrom:
#         secretKeyRef:
#           name: aws-creds
#           key: access-key-id
#     - name: AWS_SECRET_ACCESS_KEY
#       valueFrom:
#         secretKeyRef:
#           name: aws-creds
#           key: secret-access-key
# Extra labels added to the pod template.
# Example: podLabels: { metrics: enabled }
podLabels: {}

# Extra annotations added to the pod template.
podAnnotations: {}

extraEnv: []

# Extra volume mounts for the controller container.
# Useful for mounting AWS credentials files or TLS CA bundles:
#   extraVolumeMounts:
#     - name: aws-creds
#       mountPath: /var/run/secrets/aws
#       readOnly: true
extraVolumeMounts: []

# Extra volumes for the pod.
#   extraVolumes:
#     - name: aws-creds
#       secret:
#         secretName: aws-creds
extraVolumes: []

controller:
  useFIPSEndpoint: false
  leaderElect: true
  metricsBindAddress: ":8080"
  healthProbeBindAddress: ":8081"
  metricsSecure: true

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

grafanaDashboard:
  enabled: false
  # Namespace where the dashboard ConfigMap is created.
  # Defaults to the release namespace. Set this to the namespace where
  # Grafana is deployed if using the sidecar dashboard provisioner.
  namespace: ""
  # Labels for the ConfigMap. The Grafana sidecar typically watches for
  # a specific label (e.g., grafana_dashboard: "1").
  labels:
    grafana_dashboard: "1"
