apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acm-sync.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acm-sync.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "acm-sync.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "acm-sync.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "acm-sync.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address={{ .Values.controller.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.controller.healthProbeBindAddress }}
            {{- if .Values.controller.leaderElect }}
            - --leader-elect
            {{- end }}
            {{- if .Values.controller.metricsSecure }}
            - --metrics-secure
            {{- end }}
            {{- if .Values.controller.useFIPSEndpoint }}
            - --use-fips-endpoint
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ (split ":" .Values.controller.metricsBindAddress)._1 | default 8080 }}
              protocol: TCP
            - name: health
              containerPort: {{ (split ":" .Values.controller.healthProbeBindAddress)._1 | default 8081 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
